  name: tests                                                                                                                                                                                                                               on:
    push:                                                                                                                  
    branches: [main]
    pull_request:
      branches: [main]
    workflow_dispatch:

  concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true                                                                                         
  jobs:                                                                                                                  
  test:
      runs-on: ubuntu-latest
      timeout-minutes: 10
      steps:
        - name: Checkout
          uses: actions/checkout@v4                                                                                  
        - name: Set up Python 3.12                                                                                             
          uses: actions/setup-python@v5
          with:
            python-version: "3.12"
            cache: pip                                                                                               
        - name: Install dependencies                                                                                           
          run: |
            python -m pip install --upgrade pip
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
            if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi                                         
            if [ -f pyproject.toml ]; then pip install -e . || true; fi
            pip install pytest                                                                                       
        - name: Run tests                                                                                                      
          run: |
            if [ -f Makefile ] && grep -qE '^test:' Makefile; then
              make test                                                                                                          
              else
              pytest -v --tb=short                                                                                               
              fi

        - name: Smoke check (CPU, fast)
          run: |
            if [ -f Makefile ] && grep -qE '^smoke:' Makefile; then
              make smoke                                                                                                         
              else
              echo "No smoke target; skipping."                                                                                 
              fi